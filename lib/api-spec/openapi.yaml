components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Product:
      type: object
      required: [id, nameAr, nameEn, slug, price, categorySlug, brandSlug, image, stock, rating, reviewCount]
      properties:
        id:         { type: string }
        nameAr:     { type: string }
        nameEn:     { type: string }
        slug:       { type: string }
        sku:        { type: string }
        price:      { type: number }
        originalPrice: { type: ["number", "null"] }
        discountPercent: { type: ["number", "null"] }
        categorySlug: { type: string }
        brandSlug:  { type: string }
        image:      { type: string }
        image2:     { type: ["string", "null"] }
        stock:      { type: integer }
        rating:     { type: number }
        reviewCount: { type: integer }
        warranty:   { type: ["string", "null"] }
        isNew:      { type: boolean }
        isBestSeller: { type: boolean }
        isExclusive: { type: boolean }
        badges:
          type: array
          items: { type: string }

    ProductDetail:
      type: object
      required: [id, nameAr, nameEn, slug, price, categorySlug, brandSlug, images, stock, rating, reviewCount, specs, descriptionAr]
      properties:
        id:           { type: string }
        nameAr:       { type: string }
        nameEn:       { type: string }
        slug:         { type: string }
        sku:          { type: string }
        price:        { type: number }
        originalPrice: { type: ["number", "null"] }
        discountPercent: { type: ["number", "null"] }
        categorySlug: { type: string }
        categoryNameAr: { type: string }
        brandSlug:    { type: string }
        brandNameEn:  { type: string }
        images:
          type: array
          items: { type: string }
        stock:        { type: integer }
        rating:       { type: number }
        reviewCount:  { type: integer }
        warranty:     { type: ["string", "null"] }
        isNew:        { type: boolean }
        isBestSeller: { type: boolean }
        isExclusive:  { type: boolean }
        descriptionAr: { type: string }
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/ProductReview"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        badges:
          type: array
          items: { type: string }
        metaTitle:       { type: ["string", "null"] }
        metaDescription: { type: ["string", "null"] }
        metaKeywords:    { type: ["string", "null"] }

    ProductSpec:
      type: object
      required: [labelAr, value]
      properties:
        labelAr: { type: string }
        value:   { type: string }

    ProductReview:
      type: object
      required: [id, authorName, rating, comment, date]
      properties:
        id:         { type: string }
        authorName: { type: string }
        rating:     { type: integer }
        comment:    { type: string }
        date:       { type: string }

    ProductVariant:
      type: object
      required: [id, label, value, price, inStock]
      properties:
        id:      { type: string }
        label:   { type: string }
        value:   { type: string }
        price:   { type: number }
        inStock: { type: boolean }

    ProductListResponse:
      type: object
      required: [products, total, page, limit]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:  { type: integer }
        page:   { type: integer }
        limit:  { type: integer }

    FlashDealsResponse:
      type: object
      required: [products, endsAt]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        endsAt: { type: string, description: "ISO date string when flash deals end" }

    Category:
      type: object
      required: [id, slug, nameAr, nameEn, icon, productCount]
      properties:
        id:           { type: string }
        slug:         { type: string }
        nameAr:       { type: string }
        nameEn:       { type: string }
        icon:         { type: string }
        image:        { type: ["string", "null"] }
        productCount: { type: integer }
        descriptionAr: { type: ["string", "null"] }
        metaTitle:       { type: ["string", "null"] }
        metaDescription: { type: ["string", "null"] }
        metaKeywords:    { type: ["string", "null"] }

    Brand:
      type: object
      required: [id, slug, nameEn, logo, productCount]
      properties:
        id:           { type: string }
        slug:         { type: string }
        nameEn:       { type: string }
        logo:         { type: string }
        website:      { type: ["string", "null"] }
        descriptionAr: { type: ["string", "null"] }
        productCount: { type: integer }

    BlogPost:
      type: object
      required: [id, slug, titleAr, excerpt, coverImage, date, readingMinutes, categoryAr]
      properties:
        id:            { type: string }
        slug:          { type: string }
        titleAr:       { type: string }
        excerpt:       { type: string }
        coverImage:    { type: string }
        date:          { type: string }
        readingMinutes: { type: integer }
        categoryAr:    { type: string }
        isFeatured:    { type: boolean }

    BlogPostDetail:
      type: object
      required: [id, slug, titleAr, contentAr, coverImage, date, readingMinutes, categoryAr, authorName]
      properties:
        id:            { type: string }
        slug:          { type: string }
        titleAr:       { type: string }
        excerpt:       { type: string }
        contentAr:     { type: string }
        coverImage:    { type: string }
        date:          { type: string }
        readingMinutes: { type: integer }
        categoryAr:    { type: string }
        isFeatured:    { type: boolean }
        authorName:    { type: string }
        authorAvatar:  { type: ["string", "null"] }
        relatedPosts:
          type: array
          items:
            $ref: "#/components/schemas/BlogPost"

    OrderItem:
      type: object
      required: [productId, nameAr, price, quantity, image]
      properties:
        productId: { type: string }
        nameAr:    { type: string }
        price:     { type: number }
        quantity:  { type: integer }
        image:     { type: string }

    OrderInput:
      type: object
      required: [customerName, phone, city, address, items, paymentMethod]
      properties:
        customerName:  { type: string }
        phone:         { type: string }
        city:          { type: string }
        address:       { type: string }
        email:         { type: ["string", "null"] }
        promoCode:     { type: ["string", "null"] }
        notes:         { type: ["string", "null"] }
        paymentMethod: { type: string, enum: [cash_on_delivery, card, bank_transfer] }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    Order:
      type: object
      required: [id, customerName, phone, city, address, items, paymentMethod, subtotal, shipping, total, status, createdAt]
      properties:
        id:            { type: string }
        customerName:  { type: string }
        phone:         { type: string }
        city:          { type: string }
        address:       { type: string }
        email:         { type: ["string", "null"] }
        promoCode:     { type: ["string", "null"] }
        discount:      { type: ["number", "null"] }
        notes:         { type: ["string", "null"] }
        paymentMethod: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotal:  { type: number }
        shipping:  { type: number }
        total:     { type: number }
        status:    { type: string }
        createdAt: { type: string }

    OrderTracking:
      type: object
      required: [id, status, timeline, estimatedDelivery]
      properties:
        id:     { type: string }
        status: { type: string }
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TrackingStep"
        estimatedDelivery: { type: string }
        trackingNumber:    { type: ["string", "null"] }

    TrackingStep:
      type: object
      required: [statusAr, completed, date]
      properties:
        statusAr:  { type: string }
        completed: { type: boolean }
        date:      { type: ["string", "null"] }

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email: { type: string }

    NewsletterResponse:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean }
        message: { type: string }

    StoreSummary:
      type: object
      required: [totalProducts, totalBrands, totalCategories, totalOrders]
      properties:
        totalProducts:   { type: integer }
        totalBrands:     { type: integer }
        totalCategories: { type: integer }
        totalOrders:     { type: integer }
        freeShippingThreshold: { type: number }

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        message: { type: ["string", "null"] }

    SettingsMap:
      type: object
      additionalProperties: true
      description: Arbitrary key/value site settings map

    AdminSetupInput:
      type: object
      required: [username, fullName, password]
      properties:
        username: { type: string, minLength: 3 }
        fullName: { type: string, minLength: 1 }
        email:    { type: ["string", "null"] }
        password: { type: string, minLength: 8 }

    AdminLoginInput:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    AdminAccountPublic:
      type: object
      required: [id, username, fullName, role, isActive, createdAt]
      properties:
        id:          { type: string }
        username:    { type: string }
        fullName:    { type: string }
        email:       { type: ["string", "null"] }
        role:        { type: string, enum: [super_admin, content_editor, order_manager] }
        isActive:    { type: boolean }
        lastLoginAt: { type: ["string", "null"] }
        createdAt:   { type: string }

    AdminMeResponse:
      type: object
      required: [admin, permissions]
      properties:
        admin:
          $ref: "#/components/schemas/AdminAccountPublic"
        permissions:
          type: array
          items: { type: string }

    AdminAccountInput:
      type: object
      required: [username, fullName, password, role]
      properties:
        username: { type: string, minLength: 3 }
        fullName: { type: string, minLength: 1 }
        email:    { type: ["string", "null"] }
        password: { type: string, minLength: 8 }
        role:     { type: string, enum: [super_admin, content_editor, order_manager] }
        isActive: { type: boolean }

    AdminAccountUpdate:
      type: object
      properties:
        fullName: { type: string }
        email:    { type: ["string", "null"] }
        password: { type: string, minLength: 8 }
        role:     { type: string, enum: [super_admin, content_editor, order_manager] }
        isActive: { type: boolean }

    AdminProduct:
      type: object
      required: [id, nameAr, nameEn, slug, price, categorySlug, brandSlug, image, stock, rating, reviewCount, createdAt]
      properties:
        id:              { type: string }
        nameAr:          { type: string }
        nameEn:          { type: string }
        slug:            { type: string }
        sku:             { type: ["string", "null"] }
        price:           { type: number }
        originalPrice:   { type: ["number", "null"] }
        discountPercent: { type: ["number", "null"] }
        categorySlug:    { type: string }
        brandSlug:       { type: string }
        image:           { type: string }
        image2:          { type: ["string", "null"] }
        stock:           { type: integer }
        rating:          { type: number }
        reviewCount:     { type: integer }
        warranty:        { type: ["string", "null"] }
        isNew:           { type: boolean }
        isBestSeller:    { type: boolean }
        isExclusive:     { type: boolean }
        isFlashDeal:     { type: boolean }
        isFeatured:      { type: boolean }
        descriptionAr:   { type: ["string", "null"] }
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        badges:
          type: array
          items: { type: string }
        createdAt:       { type: string }

    AdminProductListResponse:
      type: object
      required: [products, total, page, limit]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/AdminProduct"
        total: { type: integer }
        page:  { type: integer }
        limit: { type: integer }

    AdminProductInput:
      type: object
      required: [nameAr, nameEn, slug, price, categorySlug, brandSlug, image]
      properties:
