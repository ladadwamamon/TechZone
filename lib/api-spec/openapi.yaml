components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Product:
      type: object
      required: [id, nameAr, nameEn, slug, price, categorySlug, brandSlug, image, stock, rating, reviewCount]
      properties:
        id:         { type: string }
        nameAr:     { type: string }
        nameEn:     { type: string }
        slug:       { type: string }
        sku:        { type: string }
        price:      { type: number }
        originalPrice: { type: ["number", "null"] }
        discountPercent: { type: ["number", "null"] }
        categorySlug: { type: string }
        brandSlug:  { type: string }
        image:      { type: string }
        image2:     { type: ["string", "null"] }
        stock:      { type: integer }
        rating:     { type: number }
        reviewCount: { type: integer }
        warranty:   { type: ["string", "null"] }
        isNew:      { type: boolean }
        isBestSeller: { type: boolean }
        isExclusive: { type: boolean }
        productType: { type: string, enum: [physical, digital] }
        platform:    { type: ["string", "null"] }
        region:      { type: ["string", "null"] }
        badges:
          type: array
          items: { type: string }

    ProductDetail:
      type: object
      required: [id, nameAr, nameEn, slug, price, categorySlug, brandSlug, images, stock, rating, reviewCount, specs, descriptionAr]
      properties:
        id:           { type: string }
        nameAr:       { type: string }
        nameEn:       { type: string }
        slug:         { type: string }
        sku:          { type: string }
        price:        { type: number }
        originalPrice: { type: ["number", "null"] }
        discountPercent: { type: ["number", "null"] }
        categorySlug: { type: string }
        categoryNameAr: { type: string }
        brandSlug:    { type: string }
        brandNameEn:  { type: string }
        images:
          type: array
          items: { type: string }
        stock:        { type: integer }
        rating:       { type: number }
        reviewCount:  { type: integer }
        warranty:     { type: ["string", "null"] }
        isNew:        { type: boolean }
        isBestSeller: { type: boolean }
        isExclusive:  { type: boolean }
        productType:  { type: string, enum: [physical, digital] }
        platform:     { type: ["string", "null"] }
        region:       { type: ["string", "null"] }
        deliveryType: { type: ["string", "null"] }
        digitalInstructionsAr: { type: ["string", "null"] }
        descriptionAr: { type: string }
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/ProductReview"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        badges:
          type: array
          items: { type: string }
        metaTitle:       { type: ["string", "null"] }
        metaDescription: { type: ["string", "null"] }
        metaKeywords:    { type: ["string", "null"] }

    ProductSpec:
      type: object
      required: [labelAr, value]
      properties:
        labelAr: { type: string }
        value:   { type: string }

    ProductReview:
      type: object
      required: [id, authorName, rating, comment, date]
      properties:
        id:         { type: string }
        authorName: { type: string }
        rating:     { type: integer }
        comment:    { type: string }
        date:       { type: string }

    ProductVariant:
      type: object
      required: [id, label, value, price, inStock]
      properties:
        id:      { type: string }
        label:   { type: string }
        value:   { type: string }
        price:   { type: number }
        inStock: { type: boolean }

    ProductListResponse:
      type: object
      required: [products, total, page, limit]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:  { type: integer }
        page:   { type: integer }
        limit:  { type: integer }

    FlashDealsResponse:
      type: object
      required: [products, endsAt]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        endsAt: { type: string, description: "ISO date string when flash deals end" }

    Category:
      type: object
      required: [id, slug, nameAr, nameEn, icon, productCount]
      properties:
        id:           { type: string }
        slug:         { type: string }
        nameAr:       { type: string }
        nameEn:       { type: string }
        icon:         { type: string }
        image:        { type: ["string", "null"] }
        productCount: { type: integer }
        descriptionAr: { type: ["string", "null"] }
        metaTitle:       { type: ["string", "null"] }
        metaDescription: { type: ["string", "null"] }
