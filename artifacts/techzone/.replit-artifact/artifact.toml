kind = "web"
previewPath = "/"
title = "TechZone متجر الإلكترونيات"
version = "1.0.0"
id = "artifacts/techzone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25339

[services.development]
run = "pnpm --filter @workspace/techzone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/techzone", "run", "build" ]
publicDir = "artifacts/techzone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25339"
BASE_PATH = "/"
