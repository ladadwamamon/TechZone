kind = "web"
previewPath = "/admin/"
title = "TechZone CMS — لوحة التحكم"
version = "1.0.0"
id = "artifacts/techzone-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 26084

[services.development]
run = "pnpm --filter @workspace/techzone-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/techzone-admin", "run", "build" ]
publicDir = "artifacts/techzone-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26084"
BASE_PATH = "/admin/"
