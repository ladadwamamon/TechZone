# =========================================================
# Nexus Store — Nginx reverse proxy + static SPA host
#   /        -> Storefront (artifacts/techzone)
#   /admin/  -> Admin CMS  (artifacts/techzone-admin)
#   /api/    -> API Server (Express, container "api")
# =========================================================

# gzip (Cloudflare adds brotli at the edge automatically)
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
  text/plain text/css text/javascript application/javascript
  application/json application/xml image/svg+xml font/woff font/woff2;

upstream api_upstream {
    server api:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # real client IP behind Cloudflare / outer proxy
    # (the request still terminates TLS at the edge)
    client_max_body_size 10m;

    # ----- API: keep the /api prefix, do NOT strip it -----
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # ----- normalize bare /admin -> /admin/ so the SPA shell loads -----
    location = /admin { return 301 /admin/; }

    # ----- Admin CMS SPA (base path /admin/) -----
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ----- Storefront SPA (base path /) -----
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ----- Long-cache hashed static assets (Vite fingerprints names) -----
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|ico|webp|avif|mp4|webm)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the SPA shells
    location = /index.html        { root /usr/share/nginx/html; add_header Cache-Control "no-store"; }
    location = /admin/index.html  { alias /usr/share/nginx/html/admin/index.html; add_header Cache-Control "no-store"; }

    # Baseline security headers (Cloudflare can add more)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
